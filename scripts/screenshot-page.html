<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>megane screenshot</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #f8fafc; }
    #viewer { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="viewer"></div>
  <script type="module">
    import { MoleculeRenderer } from "/src/renderer/MoleculeRenderer.ts";

    const renderer = new MoleculeRenderer();
    renderer.mount(document.getElementById("viewer"));

    const res = await fetch("/docs/public/data/caffeine_water.json");
    const data = await res.json();

    const snapshot = {
      nAtoms: data.nAtoms,
      nBonds: data.nBonds,
      nFileBonds: data.nFileBonds,
      positions: new Float32Array(data.positions),
      elements: new Uint8Array(data.elements),
      bonds: new Uint32Array(data.bonds),
      bondOrders: data.bondOrders ? new Uint8Array(data.bondOrders) : null,
      box: data.box ? new Float32Array(data.box) : null,
    };

    renderer.loadSnapshot(snapshot);

    // Signal that rendering is ready
    window.__MEGANE_READY = true;
  </script>
</body>
</html>

name = "megane-llm-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Origin allowed to call this proxy. CORS and the explicit Origin check
# in src/index.ts both key off this value.
[vars]
ALLOWED_ORIGIN = "https://hodakamori.github.io"

# OpenRouter model slug. Free `:free` models are occasionally retired or
# flipped to paid-only (which returns a 404) — when that happens, pick a
# currently-available one from https://openrouter.ai/models?max_price=0
# and set it here, no code change needed. Leave unset to use the default
# in src/proxy.ts. To move to paid Claude, set e.g.
# "anthropic/claude-3.5-sonnet" (requires OpenRouter credit).
OPENROUTER_MODEL = "meta-llama/llama-3.3-70b-instruct:free"

# Comma-separated fallback models. Free tiers are rate-limited per upstream
# provider, so when the primary returns a transient 429, OpenRouter routes
# to the next of these (ideally on different providers). OpenRouter caps the
# total routing list at 3, so keep this to 2 entries alongside the primary.
# Unset = the DEFAULT_FALLBACK_MODELS list in src/proxy.ts.
OPENROUTER_FALLBACK_MODELS = "openai/gpt-oss-120b:free,z-ai/glm-4.5-air:free"

# Created once via `wrangler kv namespace create RATE_LIMIT_KV`; replace
# the id below with the value it prints.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# OPENROUTER_API_KEY is a secret — set it with:
#   wrangler secret put OPENROUTER_API_KEY
# Never commit it to wrangler.toml or [vars].

name = "megane-llm-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Origin allowed to call this proxy. CORS and the explicit Origin check
# in src/index.ts both key off this value.
[vars]
ALLOWED_ORIGIN = "https://hodakamori.github.io"

# OpenRouter model slug. Set to paid Anthropic Claude 3.5 Haiku for
# reliable instruction-following (consumes OpenRouter credit; ~0.5c per
# request). To swap models — e.g. back to a free `:free` model, or up to
# anthropic/claude-sonnet-4 for top quality — just change this value, no
# code change needed. Leave unset to use the default in src/proxy.ts.
OPENROUTER_MODEL = "anthropic/claude-3.5-haiku"

# Comma-separated fallback models, used only if the primary errors. These
# stay on free models as a no-cost safety net so the demo never hard-fails
# if Claude has a transient issue. OpenRouter caps the total routing list
# at 3, so keep this to 2 entries alongside the primary. Unset = the
# DEFAULT_FALLBACK_MODELS list in src/proxy.ts.
OPENROUTER_FALLBACK_MODELS = "openai/gpt-oss-120b:free,z-ai/glm-4.5-air:free"

# Created once via `wrangler kv namespace create RATE_LIMIT_KV`; replace
# the id below with the value it prints.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# OPENROUTER_API_KEY is a secret — set it with:
#   wrangler secret put OPENROUTER_API_KEY
# Never commit it to wrangler.toml or [vars].

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-python:
    name: Python lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uvx ruff check python/
      - run: uvx ruff format --check python/
      - run: uvx ty check python/

  lint-rust:
    name: Rust lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings

  test-rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --package megane-core --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_on_error: true

  test-ts:
    name: TypeScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: |
          # Retry transient network failures from rustwasm.github.io (~once a week on GH-hosted runners).
          for i in 1 2 3; do
            curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh && break
            echo "wasm-pack install attempt $i failed; retrying in $((i*5))s"
            sleep $((i*5))
          done
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build:wasm
      - run: npm run format:check
      - run: npm run lint
      - run: npm test -- --coverage
      - uses: codecov/codecov-action@v5
        with:
          files: coverage/ts/lcov.info
          flags: typescript
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_on_error: true

  render-smoke:
    name: Bundle render smoke test
    # Builds the Vite bundles with the EXACT locked toolchain (npm ci) and loads
    # each one headless to assert the viewer mounts and the WebGL canvas draws.
    # This catches "blank webview" regressions (e.g. the Vite 8 / rolldown bundle
    # that shipped a blank VSCode extension in v0.9.0) that neither unit tests nor
    # the local-only E2E suite see, because the artifact that ships (CI `npm ci`)
    # is never the artifact the developer tested locally. Baseline-free, so it is
    # safe on hosted runners where pixel diffs are flaky.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: |
          for i in 1 2 3; do
            curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh && break
            echo "wasm-pack install attempt $i failed; retrying in $((i*5))s"
            sleep $((i*5))
          done
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build:wasm
      # Build the webapp bundle and the VSCode webview bundle with the locked deps.
      - run: npm run build:app
      - name: Build VSCode webview bundle
        run: cd vscode-megane && npm ci && npm run build:webview
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run smoke:render

  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: |
          # Retry transient network failures from rustwasm.github.io (~once a week on GH-hosted runners).
          for i in 1 2 3; do
            curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh && break
            echo "wasm-pack install attempt $i failed; retrying in $((i*5))s"
            sleep $((i*5))
          done
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build:wasm
      - run: npm run build:widget
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - run: python -m pytest --cov-report=xml:coverage.xml
      - uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_on_error: true

  test-notebooks:
    name: Notebook tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: |
          # Retry transient network failures from rustwasm.github.io (~once a week on GH-hosted runners).
          for i in 1 2 3; do
            curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh && break
            echo "wasm-pack install attempt $i failed; retrying in $((i*5))s"
            sleep $((i*5))
          done
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: PUPPETEER_SKIP_DOWNLOAD=1 npm ci
      - run: npm run build:wasm
      - run: npm run build:widget
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and notebook dependencies
        run: pip install -e ".[dev]" jupyterlab
      - name: Run notebook tests
        run: python -m pytest tests/python/test_notebooks.py -v

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: |
          # Retry transient network failures from rustwasm.github.io (~once a week on GH-hosted runners).
          for i in 1 2 3; do
            curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh && break
            echo "wasm-pack install attempt $i failed; retrying in $((i*5))s"
            sleep $((i*5))
          done
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build:wasm
      - run: npm run build:widget
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run integration tests
        run: python -m pytest tests/python/test_serve_integration.py tests/python/test_demo_code.py -v

  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t megane:ci .

  test-sdist:
    name: sdist self-contained build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: |
          # Retry transient network failures from rustwasm.github.io.
          for i in 1 2 3; do
            curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh && break
            echo "wasm-pack install attempt $i failed; retrying in $((i*5))s"
            sleep $((i*5))
          done
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install jupyterlab maturin
      - run: npm ci
      - run: npm run build
      - run: maturin sdist --out dist
      - name: Verify wheel-share present in sdist
        run: |
          tar -tzf dist/*.tar.gz | grep -q 'wheel-share/data/share/jupyter/labextensions/' \
            || { echo "::error::sdist missing labextension data"; exit 1; }
      - name: Build wheel from extracted sdist
        run: |
          mkdir _sdist_check && cd _sdist_check
          tar -xzf ../dist/*.tar.gz
          cd megane-*
          pip wheel --no-deps . -w ../out
          python -c "import zipfile, glob; z = zipfile.ZipFile(glob.glob('../out/*.whl')[0]); assert any('share/jupyter/labextensions/megane-jupyterlab' in n for n in z.namelist()), 'labextension missing from wheel'; print('OK')"

  # Cross-platform 3-layer E2E (`tests/e2e/*.spec.ts`) is **local-only**.
  #
  # We attempted to run the suite on GH-hosted ubuntu-latest runners but
  # the `webapp` / `contract` projects hit a non-deterministic port-bind
  # race against Playwright's webServer manager (5-second fast-fails),
  # and the JupyterLab-hosted projects suffered baseline drift between
  # the dev container Chromium and the CI Chromium fonts/fontconfig.
  # Stabilising both required CI-environment-specific patches that we
  # don't want to maintain.
  #
  # The expectation is that contributors run the E2E suite locally before
  # pushing changes that touch the WebApp / Viewport / MoleculeRenderer
  # / Widget / DocWidget paths. See `.claude/skills/testing/SKILL.md`
  # for the commands.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-python:
    name: Python lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uvx ruff check python/
      - run: uvx ruff format --check python/
      - run: uvx ty check python/

  lint-rust:
    name: Rust lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings

  test-rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p megane-core

  test-ts:
    name: TypeScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build:wasm
      - run: npm run format:check
      - run: npm run lint
      - run: npm test

  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build:wasm
      - run: npm run build:widget
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - run: python -m pytest --cov-report=xml:coverage.xml
      - uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_on_error: false

  test-notebooks:
    name: Notebook tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: PUPPETEER_SKIP_DOWNLOAD=1 npm ci
      - run: npm run build:wasm
      - run: npm run build:widget
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and notebook dependencies
        run: pip install -e ".[dev]" jupyterlab
      - name: Run notebook tests
        run: python -m pytest tests/python/test_notebooks.py -v

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build:wasm
      - run: npm run build:widget
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run integration tests
        run: python -m pytest tests/python/test_serve_integration.py tests/python/test_demo_code.py -v

  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t megane:ci .

  e2e:
    name: E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - webapp
          - contract
          - widget-jupyterlab
          - jupyterlab-doc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build:wasm
      - run: npm run build:widget
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python package + JupyterLab
        if: matrix.project == 'jupyterlab-doc' || matrix.project == 'widget-jupyterlab'
        run: |
          pip install -e ".[dev]" jupyterlab
      - name: Build labextension (jupyterlab-doc only)
        if: matrix.project == 'jupyterlab-doc'
        run: npm run build:lab
      - name: Install megane labextension into JupyterLab
        if: matrix.project == 'jupyterlab-doc'
        run: |
          mkdir -p $(jupyter --data-dir)/labextensions
          cp -r wheel-share/data/share/jupyter/labextensions/megane-jupyterlab \
                $(jupyter --data-dir)/labextensions/
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E (${{ matrix.project }})
        env:
          MEGANE_E2E_NO_WEBSERVER: ${{ (matrix.project == 'webapp' || matrix.project == 'contract') && '' || '1' }}
        run: npx playwright test --project=${{ matrix.project }} --reporter=list,html
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
            tests/e2e/baselines/${{ matrix.project }}/*.diff.png
            tests/e2e/baselines/${{ matrix.project }}/*.new.png
          if-no-files-found: ignore
          retention-days: 14

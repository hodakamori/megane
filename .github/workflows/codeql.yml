name: "CodeQL"

# Advanced CodeQL setup. Replaces the repo's CodeQL "default setup" so that
# generated build artifacts (e.g. the anywidget bundle that vendors three.js /
# React) can be excluded from analysis via `paths-ignore`. Those bundles are
# minified build output, not hand-written source, and produce non-actionable
# alerts (e.g. three.js MathUtils.generateUUID using Math.random).
#
# NOTE: the repository's CodeQL *default setup* must be disabled in
# Settings -> Code security -> CodeQL analysis (switch to "Advanced") for this
# workflow to be accepted — otherwise code scanning rejects advanced uploads
# while default setup is enabled.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "27 3 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: rust
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Exclude generated / vendored build artifacts from analysis.
          config: |
            paths-ignore:
              - python/megane/static/**
              - dist/**
              - wheel-share/**
              - "**/*.min.js"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e-app:
    name: Browser app E2E (snapshots + interaction + perf)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: PUPPETEER_SKIP_DOWNLOAD=1 npm ci
      - run: npm run build:wasm

      - name: Install Playwright (project-local) and Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install chromium --with-deps

      - name: snapshot.test.mjs
        timeout-minutes: 6
        run: node tests/e2e/snapshot.test.mjs
        env:
          CI: "true"

      - name: format_load_app.test.mjs
        if: always()
        timeout-minutes: 6
        run: node tests/e2e/format_load_app.test.mjs

      - name: interaction_app.test.mjs
        if: always()
        timeout-minutes: 5
        run: node tests/e2e/interaction_app.test.mjs

      - name: perf_app.test.mjs
        if: always()
        timeout-minutes: 8
        run: node tests/e2e/perf_app.test.mjs

      - name: Upload screenshots and perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-app-${{ github.run_id }}
          path: |
            tests/e2e/snapshots/**
            tests/e2e/*.png
            tests/e2e/perf_*.json
          retention-days: 14
          if-no-files-found: warn

  e2e-jupyter:
    name: ipywidget + JupyterLab extension E2E
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: PUPPETEER_SKIP_DOWNLOAD=1 npm ci

      # Python + JupyterLab MUST be installed before `npm run build:lab`,
      # since that step invokes `jupyter labextension build` to populate
      # wheel-share/data/share/jupyter/labextensions/megane-jupyterlab/.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install JupyterLab + maturin
        run: pip install jupyterlab maturin

      - run: npm run build:wasm
      - run: npm run build:widget
      - run: npm run build:lab

      - name: Install megane Python package (editable + dev extras)
        run: |
          pip install -e ".[dev]"
          maturin develop --release

      - name: Install Playwright (project-local) and Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install chromium --with-deps

      - name: test_widget_render.mjs (existing baseline)
        if: always()
        timeout-minutes: 8
        run: node tests/e2e/test_widget_render.mjs

      - name: widget_interaction.test.mjs
        if: always()
        timeout-minutes: 6
        run: node tests/e2e/widget_interaction.test.mjs

      - name: jupyterlab_open_file.test.mjs
        if: always()
        timeout-minutes: 8
        run: node tests/e2e/jupyterlab_open_file.test.mjs

      - name: perf_widget.test.mjs
        if: always()
        timeout-minutes: 8
        run: node tests/e2e/perf_widget.test.mjs

      - name: Upload screenshots and perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-jupyter-${{ github.run_id }}
          path: |
            tests/e2e/snapshots/**
            tests/e2e/*.png
            tests/e2e/perf_*.json
          retention-days: 14
          if-no-files-found: warn

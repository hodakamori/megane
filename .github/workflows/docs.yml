name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/renderer/**"
      - "src/types.ts"
      - "src/constants.ts"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root dependencies (for TypeDoc type resolution)
        run: npm ci --ignore-scripts

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Generate demo data
        run: python3 docs/scripts/generate-demo-data.py

      - name: Create WASM type stubs
        run: |
          mkdir -p crates/megane-wasm/pkg
          cp docs/wasm-stub.d.ts crates/megane-wasm/pkg/index.d.ts

      - name: Generate API references
        working-directory: docs
        run: |
          npm run api:py
          npm run api:ts

      - name: Build docs
        working-directory: docs
        run: npx vitepress build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

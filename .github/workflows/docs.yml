name: Deploy Docs

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "docs/**"
      - "src/**"
      - "crates/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build WASM module
        run: npm run build:wasm

      - name: Build demo app for docs
        run: npx vite build --config vite.docs-demo.config.ts

      - name: Generate demo data
        run: python3 docs/scripts/generate-demo-data.py

      - name: Prepare notebook data
        run: |
          pip install markdown nbformat nbconvert
          python3 docs/scripts/prepare-notebooks.py

      - name: Create WASM type stubs (for TypeDoc)
        run: |
          cp docs/wasm-stub.d.ts crates/megane-wasm/pkg/index.d.ts

      - name: Generate API references
        working-directory: docs
        run: |
          npm run api:py
          npm run api:ts

      - name: Build docs
        working-directory: docs
        run: npx vitepress build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy demo to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  CLOUDFLARE_PROJECT_NAME: megane-demo

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          # Retry transient network failures from rustwasm.github.io (~once a week on GH-hosted runners).
          for i in 1 2 3; do
            curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh && break
            echo "wasm-pack install attempt $i failed; retrying in $((i*5))s"
            sleep $((i*5))
          done

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npm run build:wasm

      - run: npm run build:app

      - name: Verify build artifacts
        run: test -f python/megane/static/app/index.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy python/megane/static/app --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.ref_name }}

      - name: Print deployment summary
        run: |
          {
            echo "## Deployment Complete"
            echo "Project: ${CLOUDFLARE_PROJECT_NAME}"
            echo "Branch: ${GITHUB_REF_NAME}"
            echo "Custom domain: https://megane.tech-office-mori.com (after DNS cutover)"
          } >> "$GITHUB_STEP_SUMMARY"

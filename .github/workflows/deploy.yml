name: Deploy demo to AWS S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC role assumption

env:
  AWS_REGION: ap-northeast-1
  APP_NAME: megane

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          # Retry transient network failures from rustwasm.github.io (~once a week on GH-hosted runners).
          for i in 1 2 3; do
            curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh && break
            echo "wasm-pack install attempt $i failed; retrying in $((i*5))s"
            sleep $((i*5))
          done

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npm run build:wasm

      - run: npm run build:app

      - name: Verify build artifacts
        run: test -f python/megane/static/app/index.html

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Ensure S3 state bucket exists
        run: |
          set -euo pipefail
          aws s3api head-bucket --bucket "${APP_NAME}-terraform-state" 2>/dev/null || \
            aws s3 mb "s3://${APP_NAME}-terraform-state" --region "$AWS_REGION"

      - name: Terraform init
        working-directory: deploy/terraform
        run: terraform init

      - name: Terraform apply
        working-directory: deploy/terraform
        run: terraform apply -auto-approve

      - name: Export Terraform outputs
        id: tf
        working-directory: deploy/terraform
        run: |
          set -euo pipefail
          {
            echo "bucket_name=$(terraform output -raw bucket_name)"
            echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)"
            echo "service_url=$(terraform output -raw service_url)"
          } >> "$GITHUB_OUTPUT"

      - name: Sync static site to S3
        run: |
          set -euo pipefail
          # Long cache for hashed Vite assets, short cache for index.html so
          # users always pick up the latest entrypoint after deploy.
          aws s3 sync python/megane/static/app/ "s3://${{ steps.tf.outputs.bucket_name }}/" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 cp python/megane/static/app/index.html \
            "s3://${{ steps.tf.outputs.bucket_name }}/index.html" \
            --cache-control "public,max-age=0,must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.distribution_id }}" \
            --paths "/*" \
            --no-cli-pager

      - name: Print deployment summary
        run: |
          {
            echo "## Deployment Complete"
            echo "URL: ${{ steps.tf.outputs.service_url }}"
            echo "Bucket: ${{ steps.tf.outputs.bucket_name }}"
            echo "Distribution: ${{ steps.tf.outputs.distribution_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

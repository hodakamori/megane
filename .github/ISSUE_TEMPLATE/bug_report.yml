name: Bug Report
description: Report a bug in megane
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the fields below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: List the steps needed to trigger the bug.
      placeholder: |
        1. Open file ...
        2. Click on ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or screenshots if available.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. Ubuntu 22.04, macOS 14, Windows 11
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: e.g. 3.11.5
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome 120, Firefox 121
    validations:
      required: false

  - type: input
    id: file-format
    attributes:
      label: File Format Being Viewed
      description: The molecular file format involved, if applicable.
      placeholder: e.g. PDB, GRO, XYZ, MOL, CIF, XTC
    validations:
      required: false
